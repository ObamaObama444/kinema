<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Kinematics</title>
    <link rel="stylesheet" href="/assets/css/main.css?v=miniapp_20260420074332">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="auth-body">
    <main class="auth-layout">
        <section class="phone auth-phone">
            <p class="pill launcher-pill">Telegram Mini App</p>
            <header class="hero-head auth-head">
                <div class="head-copy">
                    <p class="kicker">Register</p>
                    <h1>Регистрация</h1>
                    <p class="subtitle">Создайте аккаунт и сохраните свой onboarding, ритм и будущий персональный маршрут.</p>
                </div>
                <div class="avatar">K</div>
            </header>
            <section class="auth-card">
                <h1 class="auth-title">Регистрация в Kinematics</h1>
                <p class="auth-subtitle">Создайте аккаунт, чтобы сохранить onboarding, ваш ритм тренировок и будущий персональный план.</p>
                <p id="telegram-context" class="auth-subtitle"></p>
                <p id="telegram-auth-copy" class="auth-subtitle"></p>

                <form id="register-form" novalidate>
                    <div class="auth-field">
                        <label for="name">Имя (необязательно)</label>
                        <input id="name" name="name" type="text" autocomplete="name">
                    </div>

                    <div class="auth-field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" autocomplete="email" required>
                    </div>

                    <div class="auth-field">
                        <label for="password">Пароль (минимум 8 символов)</label>
                        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
                    </div>

                    <div id="auth-error" class="auth-error" role="alert"></div>

                    <button class="auth-submit" type="submit">Создать аккаунт</button>
                </form>

                <p class="auth-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
            </section>
        </section>
    </main>

    <script src="/assets/js/site.js?v=miniapp_20260420074332"></script>
    <script src="/assets/js/app.js?v=miniapp_20260420074332"></script>
    <script src="/assets/js/auth-page.js?v=miniapp_20260420074332"></script>
    <script src="/assets/js/auth.js?v=miniapp_20260420074332"></script>
</body>
</html>
